<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>KI-Status Board</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>KI-Status Board</h1>
    <button id="refreshBtn" class="ghost-btn">Aktualisieren</button>
  </header>

  <main class="view">
    <section class="card">
      <h2>Neuer Eintrag</h2>
      <form id="entryForm" class="form">
        <label>Name
          <input type="text" name="name" required maxlength="100" placeholder="z.B. Max Mustermann" />
        </label>
        <label>Firma
          <input type="text" name="firma" required maxlength="100" placeholder="z.B. ESV Erfurt" />
        </label>
        <label>Thema
          <input type="text" name="thema" required maxlength="200" placeholder="z.B. Angebot LV Elektro" />
        </label>
        <label>Statusmeldung
          <textarea name="status" rows="3" required maxlength="500" placeholder="z.B. Prüfe Artikel-Matching, fast fertig"></textarea>
        </label>
        <p id="formError" class="error hidden"></p>
        <button type="submit" class="primary-btn">Eintragen</button>
      </form>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>Aktuelle Einträge</h2>
      </div>
      <ul id="entryList" class="entry-list"></ul>
      <p id="emptyState" class="muted hidden">Noch keine Einträge vorhanden.</p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
