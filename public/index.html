<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>KI-Status Board</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-tile"><img src="/assets/egruppe-logo.png" alt="E.GRUPPE Logo" /></span>
      <h1>KI-Status Board</h1>
    </div>
    <button id="refreshBtn" class="ghost-btn">Aktualisieren</button>
  </header>

  <main id="welcomeView" class="view">
    <section class="card welcome-card">
      <p>Tragt bitte hier ein, an was ihr gerade mit der KI arbeitet. Damit ist sichergestellt, dass verwandte Themen nicht mehrfach bearbeitet werden.</p>
      <button id="startBtn" class="primary-btn">Weiter</button>
    </section>
  </main>

  <main id="appView" class="view hidden">
    <section class="card">
      <h2>Neuer Eintrag</h2>
      <form id="entryForm" class="form">
        <label>Name
          <input type="text" name="name" required maxlength="100" placeholder="z.B. Max Mustermann" />
        </label>
        <label>Firma
          <input type="text" name="firma" required maxlength="100" placeholder="z.B. ESV Erfurt" />
        </label>
        <label>Thema
          <input type="text" name="thema" required maxlength="200" placeholder="z.B. Angebot LV Elektro" />
        </label>
        <label>Fortschritt
          <select name="progress" required>
            <option value="" disabled selected>Bitte wählen</option>
            <option value="0">0%</option>
            <option value="10">10%</option>
            <option value="20">20%</option>
            <option value="30">30%</option>
            <option value="40">40%</option>
            <option value="50">50%</option>
            <option value="60">60%</option>
            <option value="70">70%</option>
            <option value="80">80%</option>
            <option value="90">90%</option>
            <option value="100">100%</option>
          </select>
        </label>
        <p id="formError" class="error hidden"></p>
        <button type="submit" class="primary-btn">Eintragen</button>
      </form>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>Aktuelle Einträge</h2>
      </div>
      <ul id="entryList" class="entry-list"></ul>
      <p id="emptyState" class="muted hidden">Noch keine Einträge vorhanden.</p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
